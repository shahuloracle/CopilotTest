<app-add-customer [visible]="visible" (visibleChange)="onVisibleChange($event)" [customer]="customer"></app-add-customer>
<p-toolbar>
            <ng-template #start>
                <p-button label="New" icon="pi pi-plus" severity="secondary" class="mr-2" (onClick)="openNew()" />
            </ng-template>
</p-toolbar>
<p-table
            #dt
            [value]="customerList()"
            [rows]="10"
            [columns]="cols"
            [paginator]="true"
            [tableStyle]="{ 'min-width': '75rem'}"
            [(selection)]="selectedcustomer"
            [rowHover]="true"
            dataKey="id"
            currentPageReportTemplate="Showing {first} to {last} of {totalRecords} customer"
            [showCurrentPageReport]="true"
            [rowsPerPageOptions]="[10, 20, 30]"
        >
            <ng-template #caption>
                <div class="flex items-center justify-between">
                    <h5 class="m-0">Customer</h5>
                    <p-iconfield>
                        <p-inputicon styleClass="pi pi-search" />
                        <input pInputText type="text" (input)="onGlobalFilter(dt, $event)" placeholder="Search..." />
                    </p-iconfield>
                </div>
            </ng-template>
            <ng-template #header>
                <tr>
                    <th pSortableColumn="name" style="min-width:16rem">
                        Customer
                        <p-sortIcon field="name" />
                    </th>
                    <th pSortableColumn="address" style="min-width: 32rem">
                        Address
                        <p-sortIcon field="address" />
                    </th>
                    <th pSortableColumn="phone" style="min-width:10rem">
                        Phone No.
                        <p-sortIcon field="phone" />
                    </th>
                    <th style="min-width: 12rem"></th>
                </tr>
            </ng-template>
            <ng-template #body let-customerList>
                <tr>
                    <td style="min-width: 14rem">{{ customerList.name }}</td>
                    <td style="min-width: 32rem">{{ customerList.address }}</td>
                    <td>{{ customerList.phone }}</td>
                    <td>
                        <p-button icon="pi pi-pencil" class="mr-2" [rounded]="true" [outlined]="true" (click)="editCustomer(customerList)" />
                        <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true" (click)="deleteCustomer(customerList)" />
                    </td>
                </tr>
            </ng-template>
        </p-table>
